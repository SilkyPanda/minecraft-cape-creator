<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://unpkg.com/cropperjs@1.6.2/dist/cropper.min.css"/>
        <title>Minecraft Cape Creator</title>
        <style>
            .texture-preview {
                image-rendering: pixelated;
            }
            .cape-card {
                min-width: 700px;
            }
            #editors-rail {
                display: flex;
                flex-direction: row;
                gap: 0;
                overflow-x: auto;
                padding-bottom: 8px;
            }
            #editors-rail > .cape-card {
                border-right: 1px solid var(--bs-border-color);
                flex-shrink: 0;
            }
            #editors-rail > .cape-card:last-child {
                border-right: none;
            }
        </style>
    </head>
    <body data-bs-theme="dark">
        <div class="container-fluid">
            <div class="p-4 p-md-5">
                <h1>Minecraft Cape Creator</h1>
                <hr>

                <!-- Top action bar -->
                <div class="d-flex flex-wrap gap-2 align-items-center mb-4">
                    <label class="btn btn-primary mb-0" for="multi-upload">Upload Images</label>
                    <input type="file" id="multi-upload" multiple accept="image/*" class="d-none">
                    <button class="btn btn-secondary" id="add-random-btn">Random Image</button>
                    <button class="btn btn-success ms-auto" id="download-all-btn" style="display:none!important;">Download All as ZIP</button>
                </div>

                <!-- Empty state -->
                <div id="empty-state" class="text-center py-5 text-secondary">
                    <p class="fs-5">Upload one or more images to start creating capes.</p>
                    <label class="btn btn-primary" for="multi-upload">Upload Images</label>
                </div>

                <!-- Editors rail -->
                <div id="editors-rail"></div>

                <hr id="footer-hr" style="display:none;">
                <div id="footer-credits" class="text-center" style="display:none;">
                    Created by <a target="_blank" href="https://github.com/james090500">James Harrison</a> for <a target="_blank" href="https://minecraftcapes.net">MinecraftCapes</a>
                    <br>
                    <a target="_blank" href="https://github.com/minecraftcapes/minecraft-cape-creator">View us on GitHub</a>
                </div>
            </div>
        </div>

        <script src="https://unpkg.com/cropperjs@1.6.2/dist/cropper.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
        <script>
        // ── MinecraftCapeCreator (inlined from src/main.js) ──
        class MinecraftCapeCreator {
            constructor() {
                this.canvas = document.createElement('canvas');
                this.context = this.canvas.getContext('2d', { willReadFrequently: true });
                this.AUTO_COLOR = "auto"; this.color = this.AUTO_COLOR;
                this.scale = 1; this.elytraImage = true;
            }
            setColor(c) { this.color = c; }
            setAutoColor() { this.color = this.AUTO_COLOR; }
            setScale(s) { this.scale = Math.pow(2, Math.max(1, Math.min(s, 6)) - 1); }
            setImage(img) { this.image = img; }
            setBackground(bg) { this.background = bg; }
            showOnElytra(v) { this.elytraImage = v; }
            buildCape() {
                return new Promise(async (resolve, reject) => {
                    const ctx = this.context;
                    try {
                        ctx.canvas.width = 64 * this.scale; ctx.canvas.height = 32 * this.scale;
                        ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
                        const calcAvgColor = (img) => {
                            const {data} = img; let count=0, r=0, g=0, b=0;
                            for (let i=0; i<data.length; i+=20) { count++; r+=data[i]; g+=data[i+1]; b+=data[i+2]; }
                            r=Math.floor(r/count); g=Math.floor(g/count); b=Math.floor(b/count);
                            return '#'+((1<<24)|(r<<16)|(g<<8)|b).toString(16).slice(1);
                        };
                        const fr = (x,y,w,h) => ctx.fillRect(x*this.scale,y*this.scale,w*this.scale,h*this.scale);
                        const cr = (x,y,w,h) => ctx.clearRect(x*this.scale,y*this.scale,w*this.scale,h*this.scale);
                        const loadImg = src => new Promise((res,rej) => {
                            const i=new Image(); i.crossOrigin="anonymous";
                            i.onload=()=>res(i); i.onerror=rej; i.src=src;
                        });
                        let bgImg=null, fgImg=null;
                        const tasks = [];
                        if (this.background) tasks.push(loadImg(this.background).then(i => bgImg=i));
                        if (this.image) tasks.push(loadImg(this.image).then(i => fgImg=i));
                        await Promise.all(tasks);
                        if (bgImg) {
                            ctx.imageSmoothingEnabled=false;
                            ctx.drawImage(bgImg,0,0,bgImg.width,bgImg.height,0,0,this.canvas.width,this.canvas.height);
                        }
                        if (fgImg) {
                            ctx.drawImage(fgImg, 1*this.scale, 1*this.scale, 10*this.scale, 16*this.scale);
                            if (this.color === this.AUTO_COLOR)
                                ctx.fillStyle = calcAvgColor(ctx.getImageData(1*this.scale,1*this.scale,10*this.scale,16*this.scale));
                            else ctx.fillStyle = this.color;
                            if (this.elytraImage) ctx.drawImage(fgImg, 36*this.scale, 2*this.scale, 10*this.scale, 20*this.scale);
                            else if (!this.background) fr(36,2,10,20);
                            if (!this.background) {
                                fr(0,1,1,16); fr(1,0,10,1); fr(11,1,1,16); fr(11,0,10,1); fr(12,1,10,16);
                                fr(22,11,1,11); fr(31,0,3,1); fr(32,1,2,1); fr(34,0,6,1); fr(34,2,1,2); fr(35,2,1,9);
                            }
                            if (!this.background || (this.background && this.elytraImage)) {
                                cr(36,16,1,6); cr(37,19,1,3); cr(38,21,1,1);
                                cr(42,2,1,1); cr(43,2,1,2); cr(44,2,1,5); cr(45,2,1,9);
                            }
                        }
                        resolve(ctx.canvas.toDataURL());
                    } catch(err) { reject(err); }
                });
            }
            downloadCape(name="Cape") {
                const a = document.createElement('a');
                a.download = `${name}.png`;
                a.href = this.context.canvas.toDataURL("image/png").replace("image/png","image/octet-stream");
                a.click();
            }
        }

        // ── Editor Manager ──
        let totalCreated = 0;
        const editors = new Map();

        function updateUI() {
            const n = editors.size;
            document.getElementById('empty-state').style.display = n ? 'none' : 'block';
            const dlAll = document.getElementById('download-all-btn');
            dlAll.style.setProperty('display', n > 1 ? 'inline-block' : 'none', 'important');
            document.getElementById('footer-hr').style.display = n ? 'block' : 'none';
            document.getElementById('footer-credits').style.display = n ? 'block' : 'none';
        }

        function createEditor(imageSrc, label) {
            totalCreated++;
            const id = 'ep_' + Date.now() + '_' + Math.random().toString(36).slice(2);
            const capeName = label || `Cape ${totalCreated}`;

            const card = document.createElement('div');
            card.className = 'cape-card p-4';
            card.id = id;
            card.innerHTML = `
                <div class="d-flex align-items-center justify-content-between mb-3">
                    <h5 class="mb-0 cape-title" title="${capeName}">${capeName}</h5>
                    <button class="btn btn-sm btn-outline-danger remove-btn">Remove</button>
                </div>
                <hr class="mt-0">
                <div class="row">
                    <div class="col-md-6 mb-1">
                        <div>
                            <h4>Select Image</h4>
                            <div class="row">
                                <div class="col-7">
                                    <input type="file" class="form-control change-img-input" accept="image/*">
                                </div>
                                <div class="col-1 align-middle align-content-center">
                                    <p class="d-inline">or</p>
                                </div>
                                <div class="col-4">
                                    <button class="btn btn-primary random-btn">Random Image</button>
                                </div>
                            </div>
                        </div>
                        <br>
                        <div>
                            <h4>Select Background (Optional)</h4>
                            <input type="file" class="form-control bg-input" accept="image/png">
                        </div>
                        <br>
                        <div>
                            <h4>Show on Elytra</h4>
                            <div class="form-check">
                                <input class="form-check-input elytra-check" type="checkbox" checked>
                                <label class="form-check-label">Show on Elytra</label>
                            </div>
                        </div>
                        <br>
                        <div>
                            <h4>Set Color</h4>
                            <div class="row">
                                <div class="col-7">
                                    <input type="color" class="form-control color-pick" value="#FF0000">
                                </div>
                                <div class="col-1 align-middle align-content-center">
                                    <p class="d-inline">or</p>
                                </div>
                                <div class="col-4">
                                    <div class="form-check">
                                        <input class="form-check-input auto-color-check" type="checkbox" checked>
                                        <label class="form-check-label">Auto Color</label>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <br>
                        <div>
                            <h4>Set Scale (<span class="scale-label">64 / 32</span>)</h4>
                            <input type="range" class="form-range scale-range" min="1" max="6" step="1" value="1">
                        </div>
                        <hr>
                        <div>
                            <img class="cape-img mw-100" src="${imageSrc}"/>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <h3 class="text-center">Your Cape</h3>
                        <p>This is your final cape design. You can download your cape by using the button below.</p>
                        <button class="btn btn-primary dl-btn">Download Cape</button>
                        <hr>
                        <img class="cape-preview texture-preview w-100 border mb-1" src="" alt="cape preview"/>
                    </div>
                </div>
            `;

            document.getElementById('editors-rail').appendChild(card);

            const creator = new MinecraftCapeCreator();
            let autoColor = true;
            let color = '#FF0000';

            const previewImg = card.querySelector('.cape-preview');
            const scaleLabel = card.querySelector('.scale-label');

            const buildCape = () => creator.buildCape().then(d => { previewImg.src = d; });
            const onCrop = () => { creator.setImage(cropper.getCroppedCanvas().toDataURL()); buildCape(); };

            const imgEl = card.querySelector('.cape-img');
            const cropper = new Cropper(imgEl, {
                aspectRatio: 10/16, guides: false, zoomable: false,
                ready: onCrop, cropend: onCrop,
            });

            card.querySelector('.elytra-check').addEventListener('change', e => {
                creator.showOnElytra(e.target.checked); buildCape();
            });
            card.querySelector('.auto-color-check').addEventListener('change', e => {
                autoColor = e.target.checked;
                if (autoColor) creator.setAutoColor(); else creator.setColor(color);
                buildCape();
            });
            card.querySelector('.color-pick').addEventListener('input', e => {
                color = e.target.value;
                if (!autoColor) { creator.setColor(color); buildCape(); }
            });
            card.querySelector('.scale-range').addEventListener('input', e => {
                const v = parseInt(e.target.value);
                creator.setScale(v);
                const r = Math.pow(2, v-1);
                scaleLabel.textContent = `${64*r} / ${32*r}`;
                buildCape();
            });
            card.querySelector('.bg-input').addEventListener('change', e => {
                if (!e.target.files.length) { creator.setBackground(null); buildCape(); return; }
                const r = new FileReader(); r.readAsDataURL(e.target.files[0]);
                r.onload = () => { creator.setBackground(r.result); buildCape(); };
            });
            card.querySelector('.change-img-input').addEventListener('change', e => {
                if (!e.target.files.length) return;
                card.querySelector('.cape-title').textContent = e.target.files[0].name;
                const r = new FileReader(); r.readAsDataURL(e.target.files[0]);
                r.onload = () => cropper.replace(r.result);
            });
            card.querySelector('.random-btn').addEventListener('click', () => {
                cropper.replace(`https://picsum.photos/seed/${Date.now()}/1600/900`);
            });
            card.querySelector('.dl-btn').addEventListener('click', () => {
                creator.downloadCape(capeName.replace(/\.[^.]+$/,'') || 'Cape');
            });
            card.querySelector('.remove-btn').addEventListener('click', () => {
                cropper.destroy(); editors.delete(id); card.remove(); updateUI();
            });

            editors.set(id, { creator, cropper, capeName });
            updateUI();
        }

        // ── Download All as ZIP ──
        document.getElementById('download-all-btn').addEventListener('click', async () => {
            const btn = document.getElementById('download-all-btn');
            btn.disabled = true;
            btn.textContent = 'Building ZIP...';
            try {
                const zip = new JSZip();
                const nameCount = {};
                const buildPromises = [...editors.values()].map(({ creator, capeName }) => {
                    return creator.buildCape().then(dataUrl => {
                        let base = (capeName.replace(/\.[^.]+$/,'') || 'Cape').replace(/[^a-z0-9_\-\s]/gi, '_');
                        nameCount[base] = (nameCount[base] || 0) + 1;
                        const uniqueName = nameCount[base] > 1 ? `${base}_${nameCount[base]}` : base;
                        const b64 = dataUrl.split(',')[1];
                        zip.file(`${uniqueName}.png`, b64, { base64: true });
                    });
                });
                await Promise.all(buildPromises);
                const blob = await zip.generateAsync({ type: 'blob' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'capes.zip';
                a.click();
                URL.revokeObjectURL(a.href);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Download All as ZIP';
            }
        });

        // ── Batch upload ──
        document.getElementById('multi-upload').addEventListener('change', e => {
            [...e.target.files].forEach(file => {
                const r = new FileReader();
                r.onload = ev => createEditor(ev.target.result, file.name);
                r.readAsDataURL(file);
            });
            e.target.value = '';
        });

        document.getElementById('add-random-btn').addEventListener('click', () => {
            createEditor(`https://picsum.photos/seed/${Date.now()}/1600/900`, `Cape ${totalCreated + 1}`);
        });

        updateUI();
        </script>
    </body>
</html>
