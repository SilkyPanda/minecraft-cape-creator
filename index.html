<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minecraft Capes Creator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/cropperjs@1.6.2/dist/cropper.min.css"/>
    <style>
        :root {
            --bg: #0e0e0e;
            --panel: #161616;
            --border: #2a2a2a;
            --accent: #5dfc8d;
            --accent2: #fc5d5d;
            --text: #e8e8e8;
            --muted: #555;
            --panel-w: 420px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            position: sticky; top: 0; z-index: 100;
            background: #0e0e0eee; backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
        }
        .logo {
            font-family: 'VT323', monospace; font-size: 28px;
            color: var(--accent); letter-spacing: 1px; white-space: nowrap;
            text-shadow: 0 0 20px #5dfc8d44;
        }
        .logo span { color: var(--text); }
        .header-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .btn {
            font-family: 'Share Tech Mono', monospace; font-size: 13px;
            padding: 8px 16px; border: 1px solid var(--border);
            background: transparent; color: var(--text); cursor: pointer;
            transition: all .15s; letter-spacing: .5px;
        }
        .btn:hover { border-color: var(--accent); color: var(--accent); }
        .btn-primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }
        .btn-primary:hover { background: #7dffaa; color: #000; border-color: #7dffaa; }
        .btn-danger { border-color: #333; color: var(--muted); }
        .btn-danger:hover { border-color: var(--accent2); color: var(--accent2); }
        .upload-label {
            font-family: 'Share Tech Mono', monospace; font-size: 13px;
            padding: 8px 16px; border: 1px dashed var(--accent);
            color: var(--accent); cursor: pointer; transition: all .15s; white-space: nowrap;
        }
        .upload-label:hover { background: #5dfc8d11; }
        #multi-upload { display: none; }
        .editor-count { margin-left: auto; color: var(--muted); font-size: 12px; }
        .empty-state {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 16px; padding: 60px 24px; color: var(--muted);
        }
        .empty-state .big-icon { font-family: 'VT323', monospace; font-size: 80px; color: #222; line-height: 1; }
        .empty-state p { font-size: 14px; }
        .editors-rail {
            display: flex; flex-direction: row; gap: 0;
            overflow-x: auto; flex: 1; align-items: stretch; padding-bottom: 0;
        }
        .editors-rail::-webkit-scrollbar { height: 6px; }
        .editors-rail::-webkit-scrollbar-track { background: var(--bg); }
        .editors-rail::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        .editor-panel {
            min-width: var(--panel-w); max-width: var(--panel-w);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column; flex-shrink: 0;
            animation: slideIn .25s ease;
        }
        @keyframes slideIn { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:translateX(0); } }
        .panel-header {
            padding: 10px 14px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 8px;
            background: #111; flex-shrink: 0;
        }
        .panel-num { font-family: 'VT323', monospace; font-size: 22px; color: var(--accent); min-width: 24px; }
        .panel-name { flex: 1; font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .panel-body { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 14px; }
        .panel-body::-webkit-scrollbar { width: 4px; }
        .panel-body::-webkit-scrollbar-thumb { background: #2a2a2a; }
        .section-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 6px; }
        .cropper-wrap { background: #111; border: 1px solid var(--border); max-height: 200px; overflow: hidden; }
        .cropper-wrap img { max-width: 100%; display: block; }
        .control-row { display: flex; align-items: center; gap: 8px; }
        .range-track { width: 100%; appearance: none; height: 3px; background: var(--border); outline: none; accent-color: var(--accent); }
        .color-swatch { width: 36px; height: 30px; border: 1px solid var(--border); padding: 2px; background: none; cursor: pointer; }
        .checkbox-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
        .checkbox-row input[type=checkbox] { accent-color: var(--accent); }
        .cape-preview-wrap {
            background: repeating-conic-gradient(#1a1a1a 0% 25%, #111 0% 50%) 0 0 / 16px 16px;
            border: 1px solid var(--border); padding: 8px;
            display: flex; align-items: center; justify-content: center;
        }
        .cape-preview-wrap img { image-rendering: pixelated; width: 100%; max-height: 100px; object-fit: contain; }
        .download-bar {
            padding: 10px 14px; border-top: 1px solid var(--border);
            display: flex; gap: 8px; background: #111; flex-shrink: 0;
        }
        .download-bar .btn { flex: 1; text-align: center; font-size: 12px; }
        .file-input-row { display: flex; gap: 6px; }
        .file-input-row input[type=file] {
            flex: 1; font-family: 'Share Tech Mono', monospace; font-size: 11px;
            background: #111; border: 1px solid var(--border); color: var(--text); padding: 5px 8px;
        }
        .file-input-row input[type=file]::file-selector-button {
            background: #222; border: none; color: var(--muted);
            font-family: 'Share Tech Mono', monospace; font-size: 10px;
            padding: 3px 8px; cursor: pointer; margin-right: 6px;
        }
        .tag { font-size: 10px; padding: 2px 7px; background: #1a1a1a; border: 1px solid var(--border); color: var(--muted); }
    </style>
</head>
<body>

<header>
    <div class="logo">⬛ Cape<span>Forge</span></div>
    <div class="header-actions">
        <input type="file" id="multi-upload" multiple accept="image/*">
        <label for="multi-upload" class="upload-label">+ Upload Images</label>
        <button class="btn" id="add-random-btn">+ Random</button>
        <button class="btn btn-danger" id="clear-all-btn">Clear All</button>
    </div>
    <div class="editor-count" id="editor-count"></div>
</header>

<div id="empty-state" class="empty-state">
    <div class="big-icon">&#x1F5FA;</div>
    <p>Upload one or more images to begin editing your capes side by side.</p>
    <label for="multi-upload" class="upload-label" style="font-size:15px;padding:12px 28px;">+ Upload Images</label>
</div>

<div class="editors-rail" id="editors-rail" style="display:none;"></div>

<script src="https://unpkg.com/cropperjs@1.6.2/dist/cropper.min.js"></script>
<script>
class MinecraftCapeCreator {
    constructor() {
        this.canvas = document.createElement('canvas');
        this.context = this.canvas.getContext('2d', { willReadFrequently: true });
        this.AUTO_COLOR = "auto"; this.color = this.AUTO_COLOR;
        this.scale = 1; this.elytraImage = true;
    }
    setColor(c) { this.color = c; }
    setAutoColor() { this.color = this.AUTO_COLOR; }
    setScale(s) { this.scale = Math.pow(2, Math.max(1, Math.min(s, 6)) - 1); }
    setImage(img) { this.image = img; }
    setBackground(bg) { this.background = bg; }
    showOnElytra(v) { this.elytraImage = v; }
    buildCape() {
        return new Promise(async (resolve, reject) => {
            const ctx = this.context;
            try {
                ctx.canvas.width = 64 * this.scale; ctx.canvas.height = 32 * this.scale;
                ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
                const calcAvgColor = (img) => {
                    const {data} = img; let count=0, r=0, g=0, b=0;
                    for (let i=0; i<data.length; i+=20) { count++; r+=data[i]; g+=data[i+1]; b+=data[i+2]; }
                    return '#'+((1<<24)|(r/count<<16)|(g/count<<8)|(b/count)).toString(16).slice(1);
                };
                const fr = (x,y,w,h) => ctx.fillRect(x*this.scale,y*this.scale,w*this.scale,h*this.scale);
                const cr = (x,y,w,h) => ctx.clearRect(x*this.scale,y*this.scale,w*this.scale,h*this.scale);
                const loadImg = src => new Promise((res,rej) => { const i=new Image(); i.crossOrigin="anonymous"; i.onload=()=>res(i); i.onerror=rej; i.src=src; });
                let bgImg=null, fgImg=null;
                const tasks = [];
                if (this.background) tasks.push(loadImg(this.background).then(i => bgImg=i));
                if (this.image) tasks.push(loadImg(this.image).then(i => fgImg=i));
                await Promise.all(tasks);
                if (bgImg) { ctx.imageSmoothingEnabled=false; ctx.drawImage(bgImg,0,0,bgImg.width,bgImg.height,0,0,this.canvas.width,this.canvas.height); }
                if (fgImg) {
                    ctx.drawImage(fgImg, 1*this.scale, 1*this.scale, 10*this.scale, 16*this.scale);
                    if (this.color === this.AUTO_COLOR) ctx.fillStyle = calcAvgColor(ctx.getImageData(1*this.scale,1*this.scale,10*this.scale,16*this.scale));
                    else ctx.fillStyle = this.color;
                    if (this.elytraImage) ctx.drawImage(fgImg, 36*this.scale, 2*this.scale, 10*this.scale, 20*this.scale);
                    else if (!this.background) fr(36,2,10,20);
                    if (!this.background) {
                        fr(0,1,1,16); fr(1,0,10,1); fr(11,1,1,16); fr(11,0,10,1); fr(12,1,10,16);
                        fr(22,11,1,11); fr(31,0,3,1); fr(32,1,2,1); fr(34,0,6,1); fr(34,2,1,2); fr(35,2,1,9);
                    }
                    if (!this.background || (this.background && this.elytraImage)) {
                        cr(36,16,1,6); cr(37,19,1,3); cr(38,21,1,1);
                        cr(42,2,1,1); cr(43,2,1,2); cr(44,2,1,5); cr(45,2,1,9);
                    }
                }
                resolve(ctx.canvas.toDataURL());
            } catch(err) { reject(err); }
        });
    }
    downloadCape(name="Cape") {
        const a=document.createElement('a');
        a.download=`${name}.png`;
        a.href=this.context.canvas.toDataURL("image/png").replace("image/png","image/octet-stream");
        a.click();
    }
}

let totalCreated = 0;
const editors = new Map();

function updateCount() {
    const n = editors.size;
    document.getElementById('editor-count').textContent = n ? `${n} cape${n>1?'s':''} open` : '';
    document.getElementById('empty-state').style.display = n ? 'none' : 'flex';
    document.getElementById('editors-rail').style.display = n ? 'flex' : 'none';
}

function createEditorPanel(imageSrc, label) {
    totalCreated++;
    const id = 'ep_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const num = totalCreated;
    const name = label || `Cape ${num}`;

    const state = { autoColor: true, color: '#FF0000', scale: 1, showOnElytra: true, name };

    const panel = document.createElement('div');
    panel.className = 'editor-panel';
    panel.id = id;
    panel.innerHTML = `
        <div class="panel-header">
            <div class="panel-num">${num < 10 ? '0'+num : num}</div>
            <div class="panel-name" title="${name}">${name}</div>
            <button class="btn btn-danger remove-btn" style="padding:4px 10px;font-size:11px;">&#x2715;</button>
        </div>
        <div class="panel-body">
            <div>
                <div class="section-label">Image &mdash; crop to 10:16</div>
                <div class="cropper-wrap"><img class="cape-img" src="${imageSrc}" style="max-width:100%;display:block;"></div>
                <div style="margin-top:6px;" class="file-input-row">
                    <input type="file" class="change-img-input" accept="image/*">
                    <button class="btn random-btn" style="padding:5px 10px;font-size:11px;" title="Random image">&#x1F3B2;</button>
                </div>
            </div>
            <div>
                <div class="section-label">Background (optional)</div>
                <div class="file-input-row"><input type="file" class="bg-input" accept="image/png"></div>
            </div>
            <div>
                <div class="section-label">Elytra</div>
                <div class="checkbox-row">
                    <input type="checkbox" class="elytra-check" checked>
                    <label>Show image on elytra</label>
                </div>
            </div>
            <div>
                <div class="section-label">Color</div>
                <div class="control-row">
                    <input type="color" class="color-swatch color-pick" value="#FF0000">
                    <div class="checkbox-row">
                        <input type="checkbox" class="auto-color-check" checked>
                        <label>Auto color</label>
                    </div>
                </div>
            </div>
            <div>
                <div class="section-label" style="display:flex;justify-content:space-between;">
                    <span>Scale</span><span class="scale-label tag">64&times;32</span>
                </div>
                <input type="range" class="range-track scale-range" min="1" max="6" step="1" value="1">
            </div>
            <div>
                <div class="section-label">Cape Preview</div>
                <div class="cape-preview-wrap">
                    <img class="cape-preview" src="" alt="cape preview" style="min-height:40px;">
                </div>
            </div>
        </div>
        <div class="download-bar">
            <button class="btn btn-primary dl-btn">&#x2193; Download Cape</button>
        </div>
    `;

    document.getElementById('editors-rail').appendChild(panel);

    const creator = new MinecraftCapeCreator();
    const imgEl = panel.querySelector('.cape-img');
    const previewImg = panel.querySelector('.cape-preview');
    const scaleLabel = panel.querySelector('.scale-label');

    const buildCape = () => creator.buildCape().then(d => { previewImg.src = d; });
    const onCrop = () => { creator.setImage(cropper.getCroppedCanvas().toDataURL()); buildCape(); };

    const cropper = new Cropper(imgEl, {
        aspectRatio: 10/16, guides: false, zoomable: false,
        ready: onCrop, cropend: onCrop,
    });

    panel.querySelector('.elytra-check').addEventListener('change', e => { creator.showOnElytra(e.target.checked); buildCape(); });
    panel.querySelector('.auto-color-check').addEventListener('change', e => {
        state.autoColor = e.target.checked;
        if (state.autoColor) creator.setAutoColor(); else creator.setColor(state.color);
        buildCape();
    });
    panel.querySelector('.color-pick').addEventListener('input', e => {
        state.color = e.target.value;
        if (!state.autoColor) { creator.setColor(state.color); buildCape(); }
    });
    panel.querySelector('.scale-range').addEventListener('input', e => {
        const v = parseInt(e.target.value);
        creator.setScale(v);
        const real = Math.pow(2, v-1);
        scaleLabel.textContent = `${64*real}\xD7${32*real}`;
        buildCape();
    });
    panel.querySelector('.bg-input').addEventListener('change', e => {
        if (!e.target.files.length) { creator.setBackground(null); buildCape(); return; }
        const r = new FileReader(); r.readAsDataURL(e.target.files[0]);
        r.onload = () => { creator.setBackground(r.result); buildCape(); };
    });
    panel.querySelector('.change-img-input').addEventListener('change', e => {
        if (!e.target.files.length) return;
        panel.querySelector('.panel-name').textContent = e.target.files[0].name;
        const r = new FileReader(); r.readAsDataURL(e.target.files[0]);
        r.onload = () => cropper.replace(r.result);
    });
    panel.querySelector('.random-btn').addEventListener('click', () => {
        cropper.replace(`https://picsum.photos/seed/${Date.now()}/1600/900`);
    });
    panel.querySelector('.dl-btn').addEventListener('click', () => {
        creator.downloadCape(state.name.replace(/\.[^.]+$/,'') || 'Cape');
    });
    panel.querySelector('.remove-btn').addEventListener('click', () => {
        cropper.destroy(); editors.delete(id); panel.remove(); updateCount();
    });

    editors.set(id, { creator, cropper, state });
    updateCount();
}

document.getElementById('multi-upload').addEventListener('change', e => {
    [...e.target.files].forEach(file => {
        const r = new FileReader();
        r.onload = ev => createEditorPanel(ev.target.result, file.name);
        r.readAsDataURL(file);
    });
    e.target.value = '';
});

document.getElementById('add-random-btn').addEventListener('click', () => {
    createEditorPanel(`https://picsum.photos/seed/${Date.now()}/1600/900`, `Random ${totalCreated+1}`);
});

document.getElementById('clear-all-btn').addEventListener('click', () => {
    editors.forEach(({cropper}) => { try { cropper.destroy(); } catch(e){} });
    editors.clear();
    document.getElementById('editors-rail').innerHTML = '';
    updateCount();
});

updateCount();
</script>
</body>
</html>
